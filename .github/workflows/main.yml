

# This is a basic workflow to help you get started with Actions

name: Trusity

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: dev-deploy
  pull_request:
    branches: dev-deploy

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
  
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install node 22
        uses: actions/setup-node@v3
        with:
         node-version: 22.x

      # Runs a single command using the runners shell
      - name: Install NPM Dependencies
        run: npm i

      # Runs a set of commands using the runners shell
      - name: Build Project
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./dist
         
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
         name: production-files
         path: ./dist

      # Step 2: Setup SSH key (private key)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Step 3: Deploy via SCP (secure copy)
      - name: Deploy to server via SCP
        run: |
          scp -r ./dist/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.TARGET_DIR }}
          
      - name: Start React app via PM2
        run: |
         ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' <<'ENDSSH'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Ensure 'serve' is installed globally
          if ! command -v serve &> /dev/null; then
           npm install -g serve
          fi

          cd ${{ secrets.TARGET_DIR }}
          pm2 delete my-react-app || true
          pm2 start $(which serve) --name my-react-app -- -s . -l 3000
          pm2 save
         ENDSSH
          
      - name: Deploy to gh pages
        uses: peaceiris/actions-gh-pages@v3
        with:
         github_token: ${{ secrets.GH_ACCESS_TOKEN }}
         publish_dir: ./dist
